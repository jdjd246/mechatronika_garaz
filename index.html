<!DOCTYPE html>
<html lang="pl" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centrala Alarmowa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════ NAGŁÓWEK ═══════════════ -->
<header class="alarm-header py-3 mb-4">
    <div class="container-fluid px-4">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
            <div class="d-flex align-items-center gap-2">
                <i class="bi bi-shield-lock-fill text-success fs-4"></i>
                <span class="fw-bold text-white fs-5 letter-spacing-1">CENTRALA ALARMOWA</span>
            </div>
            <div class="d-flex align-items-center gap-3">
            </div>
        </div>
    </div>
</header>

<!-- ═══════════════ GŁÓWNA TREŚĆ ═══════════════ -->
<main class="container-fluid px-4">
    <div class="row justify-content-center">
        <div class="col-auto">

            <!-- Obraz garażu z kartami czujników -->
            <div class="garage-wrapper">
                <img src="garaz.png" alt="Model garażu" class="garage-img">

                <!-- Czujnik ruchu — przy czerwonej kopule na suficie (góra-lewo) -->
                <div class="sensor-card" id="card-ruch">
                    <div class="d-flex align-items-center gap-2">
                        <i class="fa-solid fa-person-walking sc-icon text-info"></i>
                        <div>
                            <div class="sc-name">Czujnik ruchu</div>
                            <div class="sc-status s-safe">
                                <span class="dot dot-green"></span>Brak ruchu
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Brama garażowa — lewa ściana -->
                <div class="sensor-card" id="card-brama">
                    <div class="d-flex align-items-center gap-2">
                        <i class="fa-solid fa-warehouse sc-icon text-info"></i>
                        <div>
                            <div class="sc-name">Brama garażowa</div>
                            <div class="sc-status s-safe">
                                <span class="dot dot-green"></span>Zamknięta
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Okno — tylna prawa ściana -->
                <div class="sensor-card" id="card-okno">
                    <div class="d-flex align-items-center gap-2">
                        <i class="fa-solid fa-person-through-window sc-icon text-info"></i>
                        <div>
                            <div class="sc-name">Okno</div>
                            <div class="sc-status s-safe">
                                <span class="dot dot-green"></span>Zamknięte
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Drzwi — prawa ściana -->
                <div class="sensor-card" id="card-drzwi">
                    <div class="d-flex align-items-center gap-2">
                        <i class="fa-solid fa-door-closed sc-icon text-info"></i>
                        <div>
                            <div class="sc-name">Drzwi</div>
                            <div class="sc-status s-safe">
                                <span class="dot dot-green"></span>Zamknięte
                            </div>
                        </div>
                    </div>
                </div>

            </div><!-- /garage-wrapper -->

        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /* Zegar */
    function tick() {
        const now = new Date();
        document.getElementById('clock').textContent =
            now.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    tick();
    setInterval(tick, 1000);
</script>
</body>
</html>
