<!DOCTYPE html>
<html lang="pl" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centrala Alarmowa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════ NAGŁÓWEK ═══════════════ -->
<header class="alarm-header py-3 mb-0">
    <div class="container-fluid px-4">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
            <div class="d-flex align-items-center gap-2">
                <i class="bi bi-shield-lock-fill text-success fs-4"></i>
                <span class="fw-bold text-white fs-5">CENTRALA ALARMOWA</span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <span id="alarm-badge" class="badge bg-success fs-6">
                    <i class="bi bi-bell-slash-fill me-1"></i><span id="alarm">%ALARM%</span>
                </span>
                <span id="clock" class="text-secondary fw-mono"></span>
            </div>
        </div>
    </div>
</header>

<!-- ═══════════════ GŁÓWNA TREŚĆ ═══════════════ -->
<main class="container-fluid px-4">
    <!-- Układ: garaż po lewej, prawy panel po prawej -->
    <div class="main-layout">

                <!-- ═══ OBRAZ GARAŻU Z KARTAMI CZUJNIKÓW ═══ -->
                <div class="garage-wrapper">
                    <img src="garaz.png" alt="Model garażu" class="garage-img">

                    <!-- Czujnik ruchu -->
                    <div class="sensor-card" id="card-ruch">
                        <div class="d-flex align-items-center gap-2">
                            <i class="fa-solid fa-person-walking sc-icon text-info"></i>
                            <div>
                                <div class="sc-name">Czujnik ruchu</div>
                                <div class="sc-status s-safe">
                                    <span class="dot dot-green"></span> <span id="ruch">%RUCH%</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Brama garażowa -->
                    <div class="sensor-card" id="card-brama">
                        <div class="d-flex align-items-center gap-2">
                            <i class="fa-solid fa-warehouse sc-icon text-info"></i>
                            <div>
                                <div class="sc-name">Brama garażowa</div>
                                <div class="sc-status s-safe">
                                    <span class="dot dot-green"></span> <span id="brama">%BRAMA%</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Okno -->
                    <div class="sensor-card" id="card-okno">
                        <div class="d-flex align-items-center gap-2">
                            <i class="fa-solid fa-person-through-window sc-icon text-info"></i>
                            <div>
                                <div class="sc-name">Okno</div>
                                <div class="sc-status s-safe">
                                    <span class="dot dot-green"></span> <span id="okno">%OKNO%</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Drzwi -->
                    <div class="sensor-card" id="card-drzwi">
                        <div class="d-flex align-items-center gap-2">
                            <i class="fa-solid fa-door-closed sc-icon text-info"></i>
                            <div>
                                <div class="sc-name">Drzwi</div>
                                <div class="sc-status s-safe">
                                    <span class="dot dot-green"></span> <span id="drzwi">%DRZWI%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div><!-- /garage-wrapper -->

                <!-- ═══ PRAWY PANEL ═══ -->
                <div class="right-panel">

                    <!-- Panel sterowania -->
                    <div class="rp-block rp-control">
                        <div class="rp-title">Panel sterowania</div>

                        <!-- Status alarmu -->
                        <div class="alarm-status-box state-disarmed" id="alarm-status-box">
                            <i class="bi bi-shield-slash-fill" id="alarm-status-icon"></i>
                            <div>
                                <div class="alarm-status-label" id="alarm-status-label">ROZBROJONY</div>
                                <div class="alarm-status-sub" id="alarm-status-sub">System nieaktywny</div>
                            </div>
                        </div>

                        <!-- Przyciski obok siebie -->
                        <div class="control-grid">
                            <button id="btn-det" class="ctrl-btn btn btn-outline-secondary" onclick="toggleDetection()">
                                <i class="bi bi-eye-slash-fill" id="btn-det-icon"></i>
                                <span id="det-action">WŁĄCZ DETEKCJĘ</span>
                            </button>
                            <button class="ctrl-btn btn btn-outline-warning" onclick="resetAlarm()">
                                <i class="bi bi-arrow-counterclockwise"></i>
                                <span>RESETUJ ALARM</span>
                            </button>
                        </div>
                    </div>


                    <div class="rp-divider"></div>

                    <!-- Historia zdarzeń -->
                    <div class="rp-block rp-history">
                        <div class="rp-title d-flex align-items-center justify-content-between">
                            <span>Historia zdarzeń</span>
                            <span class="badge bg-secondary fw-normal" id="history-count">0</span>
                        </div>
                        <div class="history-list" id="history-list">
                            <div class="text-secondary text-center py-3 fst-italic" style="font-size:0.82rem;">
                                Brak zdarzeń
                            </div>
                        </div>
                        <button class="btn btn-outline-secondary btn-clear-history" onclick="clearHistory()">
                            <i class="bi bi-trash me-1"></i>Wyczyść historię
                        </button>
                    </div>

                </div><!-- /right-panel -->

    </div><!-- /main-layout -->
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /* Zegar */
    function tick() {
        document.getElementById('clock').textContent =
            new Date().toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    tick();
    setInterval(tick, 1000);
</script>
<script>
    // ── Stan lokalny ──────────────────────────────────────────
    let detectionOn = true;   // /detection → "1" = aktywna
    let hasAlarm    = false;  // /alarm     → aktywny alarm

    // ── Pomocnik fetch ────────────────────────────────────────
    function apiFetch(endpoint) {
        return fetch(endpoint).then(r => {
            if (!r.ok) throw new Error(endpoint);
            return r.text();
        });
    }

    // ── Status alarmu (nagłówek + panel) ─────────────────────
    function updateAlarm(val) {
        document.getElementById('alarm').textContent = val;
        const badge    = document.getElementById('alarm-badge');
        const wasAlarm = hasAlarm;
        hasAlarm = val.trim() === 'AKTYWOWANY';
        badge.className = 'badge fs-6 ' + (hasAlarm ? 'bg-danger' : 'bg-success');
        badge.querySelector('i').className = 'bi me-1 ' + (hasAlarm ? 'bi-bell-fill' : 'bi-bell-slash-fill');
        updateStatusBox();
    }

    // ── Wskaźnik stanu w panelu ───────────────────────────────
    function updateStatusBox() {
        const box   = document.getElementById('alarm-status-box');
        const label = document.getElementById('alarm-status-label');
        const sub   = document.getElementById('alarm-status-sub');
        const icon  = document.getElementById('alarm-status-icon');

        box.className = 'alarm-status-box ';
        if (hasAlarm) {
            box.classList.add('state-alert');
            icon.className    = 'bi bi-exclamation-triangle-fill';
            label.textContent = 'ALARM AKTYWNY';
            sub.textContent   = 'Wykryto wtargnięcie · naciśnij RESETUJ';
        } else if (detectionOn) {
            box.classList.add('state-detection');
            icon.className    = 'bi bi-eye-fill';
            label.textContent = 'DETEKCJA ON';
            sub.textContent   = 'Czujniki aktywne · monitoring działa';
        } else {
            box.classList.add('state-disarmed');
            icon.className    = 'bi bi-eye-slash-fill';
            label.textContent = 'DETEKCJA OFF';
            sub.textContent   = 'Monitoring wyłączony · naciśnij WŁĄCZ';
        }
    }

    function resetAlarm() {
        hasAlarm = false;
        updateStatusBox();
        apiFetch('/alarmreset').catch(console.error);
    }

    // ── Detekcja ──────────────────────────────────────────────
    function updateDetectionUI(on) {
        detectionOn = on;
        const btn    = document.getElementById('btn-det');
        const icon   = document.getElementById('btn-det-icon');
        const action = document.getElementById('det-action');
        btn.className    = 'ctrl-btn btn ' + (on ? 'btn-outline-danger' : 'btn-outline-info');
        icon.className   = 'bi ' + (on ? 'bi-eye-slash-fill' : 'bi-eye-fill');
        action.textContent = on ? 'WYŁĄCZ DETEKCJĘ' : 'WŁĄCZ DETEKCJĘ';
        updateStatusBox();
    }

    function toggleDetection() {
        const turningOn = !detectionOn;
        updateDetectionUI(turningOn);
        apiFetch('/alarmarmtoggle').catch(console.error);
    }

    // ── Historia zdarzeń (frontend) ───────────────────────────
    // Backend może zastąpić localHistory danymi z /history
    let localHistory = [];
    let lastLogId = 0;

    function parseNewLogs(logText) {
        const result = [];

        logText.split('\n').forEach(line => {

            if (!line.trim())
                return;

            const parts = line.split('|');

            if(parts.length < 4)
                return;

            const id    = Number(parts[0]);
            const ts    = parts[1];
            const type  = parts[2];
            const label = parts.slice(3).join('|');

            let icon  = 'fa-solid fa-file-lines';
            let color = 'text-light';

            switch(type)
            {
                case 'ALARM':
                    icon = 'bi bi-exclamation-triangle-fill';
                    color = 'text-danger';
                    break;

                case 'RESET':
                    icon = 'bi bi-arrow-counterclockwise';
                    color = 'text-warning';
                    break;

                case 'ARM':
                    icon = 'bi bi-eye-fill';
                    color = 'text-info';
                    break;

                case 'DISARM':
                    icon = 'bi bi-eye-slash-fill';
                    color = 'text-secondary';
                    break;
            }

            result.push({
                id,
                ts,
                label,
                icon,
                color
            });

            if(id > lastLogId)
                lastLogId = id;
        });

        return result;
    }

    async function updateLogs() {
    try
    {
        const response = await fetch(`/logs?lastId=${lastLogId}`);

        if(!response.ok)
            return;

        const text = await response.text();

        if(!text.trim())
            return;

        const newEntries = parseNewLogs(text);

        if(!newEntries.length)
            return;

        localHistory.unshift(...newEntries.reverse());

        renderHistory(localHistory);
    }
    catch(err)
    {
        console.error(err);
    }
    }

    function renderHistory(entries) {
        const list  = document.getElementById('history-list');
        const count = document.getElementById('history-count');
        count.textContent = entries.length;

        if (!entries.length) {
            list.innerHTML = '<div class="text-secondary text-center py-3 fst-italic" style="font-size:0.82rem;">Brak zdarzeń</div>';
            return;
        }

        list.innerHTML = entries.map((e, i) => {
            const sep = i < entries.length - 1 ? 'border-bottom border-secondary border-opacity-25' : '';
            return `
            <div class="history-entry d-flex align-items-center gap-2 py-2 px-1 ${sep}">
                <i class="${e.icon} ${e.color}" style="width:14px;font-size:13px;flex-shrink:0;"></i>
                <span class="fw-semibold text-white flex-grow-1" style="font-size:0.82rem;">${e.label}</span>
                <span class="text-secondary hist-ts">${e.ts}</span>
            </div>`;
        }).join('');
    }

    // ── Polling ───────────────────────────────────────────────
    function pollAll() {
        apiFetch('/alarm').then(updateAlarm).catch(console.error);
        apiFetch('/ruch').then(v  => document.getElementById('ruch').textContent  = v).catch(console.error);
        apiFetch('/drzwi').then(v => document.getElementById('drzwi').textContent = v).catch(console.error);
        apiFetch('/brama').then(v => document.getElementById('brama').textContent = v).catch(console.error);
        apiFetch('/okno').then(v  => document.getElementById('okno').textContent  = v).catch(console.error);
        apiFetch('/detection').then(v => updateDetectionUI(v.trim() === '1')).catch(console.error);
        updateLogs();
    }

    function clearHistory() {
        localHistory = [];
        lastLogId=0;
        renderHistory(localHistory);
        apiFetch('/clearlogs').catch(console.error);
    }

    pollAll();
    setInterval(pollAll, 5000);
</script>

</body>
</html>
